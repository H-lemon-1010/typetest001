<!DOCTYPE html>
<html lang="ko">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="나는 어떤 과일일까?">
<meta property="og:description" content="선택만으로 나의 성격 유형을 알아보자!">
<meta property="og:image" content="https://github.com/H-lemon-1010/typetest000/raw/main/thumb.jpg">
<meta charset="UTF-8">
<title>성격 테스트 - 좋아하는 과일</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 20px;
    background: #fdf6e3;
    font-size: 1.2em; /* 기본 폰트 크기 */
  }

  h1 { color: #2a7ae2; }
  .question { margin-bottom: 20px; }
  .options label { display: block; margin: 5px 0; cursor: pointer; transition: background 0.3s; padding: 5px; border-radius: 5px; }
  .options label:hover { background-color: #cce4ff; }
  input[type=radio] { margin-right: 10px; }
  #result { font-size: 1.5em; margin-top: 20px; color: #2a7ae2; }
  button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 1em;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background-color: #2a7ae2;
    color: white;
    transition: background 0.3s;
  }
  button:hover { background-color: #145da0; }

  /* 모바일 대응 */
  @media (max-width: 600px) {
    body {
      font-size: 1.6em !important; /* 모바일에서 글씨 키움 */
      margin: 10px;
    }

    button {
      padding: 15px 25px;
      font-size: 1.2em;
    }

    .options label {
      font-size: 1.2em;
      padding: 10px;
    }
  }
</style>
</head>
<body>

<h1>집에서 나는?</h1>

<div id="quiz">
  <div class="question" id="q1">
    <p>1.  밥 먹을때?</p>
    <div class="options">
      <label><input type="radio" name="q1" value="A"> 밥을 다 먹고 놀러 가기</label>
      <label><input type="radio" name="q1" value="B"> 그냥 조용히 먹기</label>
      <label><input type="radio" name="q1" value="C"> 재미있는 이야기를 하면서 먹기</label>
      <label><input type="radio" name="q1" value="D"> 밥을 천천히 음미하면서 먹기</label>
    </div>
    <button onclick="nextQuestion()">다음</button>
  </div>

  <div class="question" id="q2" style="display:none">
    <p>2. 갑자기 놀 시간이 생겼을 때?</p>
    <div class="options">
      <label><input type="radio" name="q2" value="A"> 밖으로 놀러 간다</label>
      <label><input type="radio" name="q2" value="B"> 혼자 재미있게 놀기</label>
      <label><input type="radio" name="q2" value="C"> 친구들을 불러서 재미있게 논다</label>
      <label><input type="radio" name="q2" value="D"> 무엇을 하고 놀지 고민한다</label>
    </div>
    <button onclick="nextQuestion()">다음</button>
  </div>

  <div class="question" id="q3" style="display:none">
    <p>3. 잘준비를 할 때?</p>
    <div class="options">
      <label><input type="radio" name="q3" value="A"> 빨리 끝낸다</label>
      <label><input type="radio" name="q3" value="B"> 아무도 모르게 한다</label>
      <label><input type="radio" name="q3" value="C"> 재미있는 놀이를 하면서 한다</label>
      <label><input type="radio" name="q3" value="D"> 내일 무엇을을 할지 생각하며 잘준비를 한다</label>
    </div>
    <button onclick="nextQuestion()">다음</button>
  </div>

  <div class="question" id="q4" style="display:none">
    <p>4. 자기 전에</p>
    <div class="options">
      <label><input type="radio" name="q4" value="A"> 운동을 하다가 잠에 든다</label>
      <label><input type="radio" name="q4" value="B"> 숙제를 하다가 잠에 든다</label>
      <label><input type="radio" name="q4" value="C"> 게임을 하다가 잠에 든다</label>
      <label><input type="radio" name="q4" value="D"> 책을 읽다가 잠에 든다</label>
    </div>
    <button onclick="nextQuestion()">다음</button>
  </div>

  <div class="question" id="q5" style="display:none">
    <p>5. 가장 좋아하는 색은?</p>
    <div class="options">
      <label><input type="radio" name="q5" value="A"> 검정</label>
      <label><input type="radio" name="q5" value="B"> 보라</label>
      <label><input type="radio" name="q5" value="C"> 흰색</label>
      <label><input type="radio" name="q5" value="D"> 회색</label>
    </div>
    <button onclick="nextQuestion()">결과 보기</button>
  </div>

</div>

<div id="result" style="display:none"></div>

<script>
let currentQuestion = 1;
const totalQuestions = 5;

function nextQuestion() {
  document.getElementById('q' + currentQuestion).style.display = 'none';
  currentQuestion++;
  if (currentQuestion <= totalQuestions) {
    document.getElementById('q' + currentQuestion).style.display = 'block';
  } else {
    showResult();
  }
}

function showResult() {
  const answers = ['q1','q2','q3','q4','q5'];
  const score = {A:0,B:0,C:0,D:0};

  answers.forEach(q => {
    const checked = document.querySelector('input[name="'+q+'"]:checked');
    if (checked) score[checked.value]++;
  });

  let max = 0;
  let type = '';
  for (let key in score) {
    if (score[key] > max) { max = score[key]; type = key; }
  }

  let resultText = '';
  if(type==='A') resultText = "🍎사과형: 활동적이고 적극적이에요!";
  if(type==='B') resultText = "🍉수박형: 독립적이고 관찰력이 뛰어나요!";
  if(type==='C') resultText = "🍐배형: 사교적이고 즐거움을 좋아해요!";
  if(type==='D') resultText = "🍈메론: 침착하고 생각이 깊어요!";

  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = resultText + '<br><button onclick="resetQuiz()">다시하기</button>';
  resultDiv.style.display = 'block';
}

function resetQuiz() {
  currentQuestion = 1;
  document.querySelectorAll('.question').forEach(q => q.style.display='none');
  document.getElementById('q1').style.display='block';
  document.getElementById('result').style.display='none';
  document.querySelectorAll('input[type=radio]').forEach(r => r.checked=false);
}
  // ===== 여기서부터 화면 크기 대응 JS =====
function adjustFont() {
  const width = window.innerWidth;
  const body = document.body;
  if (width <= 600) {
    body.style.fontSize = '20px';  // 모바일에서 글씨 크게
  } else {
    body.style.fontSize = '18px';  // PC에서 기본
  }
}

window.addEventListener('load', adjustFont);
window.addEventListener('resize', adjustFont);
</script>

</body>
</html>
